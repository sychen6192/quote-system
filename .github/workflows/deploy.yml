name: Deploy Next.js to Homelab

# 此 workflow 是原作者的 homelab 部署流程。
# Fork 本專案的人不會觸發它(repository_owner 條件),請參考 README 的 Deployment 章節自建流程。
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    if: github.repository_owner == 'sychen6192'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  deploy-to-homelab:
    if: github.repository_owner == 'sychen6192'
    needs: build-and-push
    runs-on: [self-hosted, homelab]

    steps:
      - name: Pull and Restart Container
        run: |
          docker pull ghcr.io/${{ github.repository }}:latest
          docker stop my-next-app || true
          docker rm my-next-app || true
          docker run -d --name my-next-app -p 3000:3000 \
            --env-file $HOME/quote-system/.env \
            -v $HOME/quote-system/branding:/app/branding \
            ghcr.io/${{ github.repository }}:latest
