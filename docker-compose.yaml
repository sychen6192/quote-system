version: '3.8'

services:
  app:
    container_name: quote-system-web
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # 覆蓋 .env 的 DATABASE_URL,讓容器連 compose 網路內的 postgres
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/quote-system
    volumes:
      - ./branding:/app/branding
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    container_name: quote-system-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=quote-system
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
